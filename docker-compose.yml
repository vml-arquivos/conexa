version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: conexa-db
    environment:
      POSTGRES_USER: conexa
      POSTGRES_PASSWORD: conexa123
      POSTGRES_DB: conexa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conexa"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conexa-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: conexa-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://conexa:conexa123@db:5432/conexa_db
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - conexa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Web Server
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: conexa-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - conexa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
    driver: local

networks:
  conexa-network:
    driver: bridge
